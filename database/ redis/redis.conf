
bind 0.0.0.0

port 6379

timeout 0

tcp-keepalive 300

daemonize no

supervised no

loglevel notice

databases 16

save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes

rdbcompression yes

rdbchecksum yes

dbfilename dump.rdb

dir /data

appendonly yes

appendfilename "appendonly.aof"

appendfsync everysec

auto-aof-rewrite-percentage 100

auto-aof-rewrite-min-size 64mb

maxmemory 512mb

maxmemory-policy allkeys-lru
