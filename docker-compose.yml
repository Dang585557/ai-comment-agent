version: "3.9"

services:

  postgres:

    image: postgres:16

    container_name: ai_company_postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: ai_company

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7

    container_name: ai_company_redis

    restart: unless-stopped

    ports:

      - "6379:6379"

    volumes:

      - redis_data:/data

  chromadb:

    image: chromadb/chroma:latest

    container_name: ai_company_chromadb

    restart: unless-stopped

    ports:

      - "8001:8000"

    volumes:

      - chroma_data:/chroma/chroma

  backend:

    build: .

    container_name: ai_company_backend

    restart: unless-stopped

    depends_on:

      - postgres

      - redis

      - chromadb

    env_file:

      - .env

    ports:

      - "8000:8000"

    command: >

      uvicorn dashboard.backend.api:app

      --host 0.0.0.0

      --port 8000

      --reload

    volumes:

      - .:/app

  dashboard:

    build:

      context: ./dashboard/frontend

    container_name: ai_company_dashboard

    restart: unless-stopped

    depends_on:

      - backend

    ports:

      - "3000:3000"

    command: npm run dev

    volumes:

      - ./dashboard/frontend:/app

volumes:

  postgres_data:

  redis_data:

  chroma_data:
